# Build, sign, and deploy Media Manager releases
name: Build & Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.2.0)'
        required: true
        default: 'v0.2.0'

permissions:
  contents: write

jobs:
  # ── TypeScript & Rust checks (fast feedback) ──
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Build Windows release ──
  build:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      # Collect all bundle artifacts
      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          # Copy .msi and .exe installers
          find src-tauri/target/release/bundle -name "*.msi" -exec cp {} release-artifacts/ \;
          find src-tauri/target/release/bundle -name "*.exe" -exec cp {} release-artifacts/ \;
          # Copy signing signature (generated by Tauri updater plugin)
          find src-tauri/target/release/bundle -name "*.msi.zip.sig" -exec cp {} release-artifacts/ 2>/dev/null || true
          find src-tauri/target/release/bundle -name "*.nsis.zip.sig" -exec cp {} release-artifacts/ 2>/dev/null || true
          ls -la release-artifacts/

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/

      # Generate GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy to ECS ──
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !github.event.inputs.skip_deploy }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/

      - name: Upload to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "release-artifacts/*"
          target: "/var/www/releases/"
          strip_components: 1

      - name: Update release manifest on ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /var/www/releases
            # Generate the signature for the MSI file
            MSI_FILE=$(ls *.msi 2>/dev/null | head -1)
            SIG_FILE=$(ls *.sig 2>/dev/null | head -1)
            if [ -n "$MSI_FILE" ] && [ -n "$SIG_FILE" ]; then
              # Register the release in the server database via API
              SIG=$(cat "$SIG_FILE")
              VERSION="${{ github.ref_name }}"
              curl -X POST http://127.0.0.1:3000/api/admin/releases \
                -H "Content-Type: application/json" \
                -H "X-Admin-Key: ${{ secrets.ADMIN_KEY }}" \
                -d "{
                  \"version\": \"$VERSION\",
                  \"platform\": \"windows\",
                  \"arch\": \"x86_64\",
                  \"url\": \"https://${{ secrets.ECS_HOST }}/releases/$MSI_FILE\",
                  \"signature\": \"$SIG\",
                  \"notes\": \"Release $VERSION — see GitHub release notes for details\"
                }"
              echo "Release $VERSION registered on server"
            else
              echo "No MSI or signature file found — skipping server registration"
            fi
