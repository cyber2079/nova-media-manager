name: Build and Release

on:
  push:
    tags:
      - 'v[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]'
      - 'v[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].[0-9]*'
      - '[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]'
      - '[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (YYYY-MM-DD or YYYY-MM-DD.N)'
        required: true
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            # Remove 'v' prefix if present
            VERSION="${TAG_NAME#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release

      - name: Test Rust workspace
        run: cargo test --workspace --all-targets

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build fonts
        run: ./target/release/warpnine-fonts build --version ${{ steps.version.outputs.version }}

      - name: Validate generated fonts
        run: uv run pytest tests/integration/test_font_output_validation.py -v
        env:
          WARPNINE_STRICT_OUTPUTS: "1"

      - name: Create zip archive
        run: |
          cd dist
          zip -r ../warpnine-fonts-${{ steps.version.outputs.version }}.zip *.ttf *.woff2 ../OFL

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CURRENT_TAG="v${VERSION}"
          PREVIOUS_TAG=$(gh release list --limit 100 --json tagName \
            --jq ".[] | select(.tagName != \"${CURRENT_TAG}\") | .tagName" \
            | head -n 1)

          if [ -z "${PREVIOUS_TAG}" ]; then
            echo "No previous release found; generating notes without a baseline"
            gh api --method POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${CURRENT_TAG}" \
              -f target_commitish="${GITHUB_SHA}" \
              --jq .body > release-notes.md
          else
            echo "Generating notes from ${PREVIOUS_TAG} to ${CURRENT_TAG}"
            gh api --method POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${CURRENT_TAG}" \
              -f previous_tag_name="${PREVIOUS_TAG}" \
              -f target_commitish="${GITHUB_SHA}" \
              --jq .body > release-notes.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            warpnine-fonts-${{ steps.version.outputs.version }}.zip
            dist/*-VF.ttf
            dist/*-VF.woff2
          body_path: release-notes.md
          draft: false
          prerelease: false
