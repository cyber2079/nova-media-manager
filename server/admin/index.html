<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nova 管理后台</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,system-ui,sans-serif;background:#080c14;color:#edf2f9;min-height:100vh;display:flex}
nav{width:200px;background:#0a0f18;border-right:1px solid rgba(255,255,255,.05);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:.25rem;position:fixed;top:0;left:0;bottom:0}
nav h1{font-size:.9rem;font-weight:800;margin-bottom:1rem;color:#fff;display:flex;align-items:center;gap:.5rem}
nav h1 span{font-size:.65rem;font-weight:500;background:rgba(71,136,240,.2);color:#7aafff;padding:.15rem .5rem;border-radius:999px}
nav button{text-align:left;padding:.55rem .75rem;border-radius:.4rem;border:none;background:transparent;color:#96adc8;font-size:.8rem;cursor:pointer;transition:all .15s;font-family:inherit}
nav button:hover{background:rgba(255,255,255,.03);color:#fff}
nav button.active{background:rgba(71,136,240,.12);color:#7aafff;font-weight:600}
main{flex:1;margin-left:200px;padding:2rem;max-width:1200px}
h2{font-size:1.1rem;font-weight:800;margin-bottom:1.25rem;color:#fff}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
.stat{padding:1.25rem;border-radius:.75rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.stat .v{font-size:1.75rem;font-weight:900;color:#fff;line-height:1.2}
.stat .l{font-size:.65rem;color:#96adc8;text-transform:uppercase;letter-spacing:.08em;margin-top:.25rem}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{text-align:left;padding:.6rem .75rem;color:#96adc8;font-weight:600;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid rgba(255,255,255,.05)}
td{padding:.55rem .75rem;border-bottom:1px solid rgba(255,255,255,.03);color:#c8ddf0}
tr:hover td{background:rgba(255,255,255,.015)}
.badge{padding:.15rem .5rem;border-radius:999px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.badge.active{background:rgba(71,136,240,.15);color:#7aafff}
.badge.revoked{background:rgba(192,57,74,.15);color:#e8929e}
.badge.expired{background:rgba(180,160,100,.15);color:#c8b870}
.btn{padding:.5rem 1rem;border-radius:.4rem;border:none;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-primary{background:rgba(71,136,240,.2);color:#7aafff}.btn-primary:hover{background:rgba(71,136,240,.35)}
.btn-danger{background:rgba(192,57,74,.15);color:#e8929e}.btn-danger:hover{background:rgba(192,57,74,.3)}
.btn-ghost{background:rgba(255,255,255,.04);color:#96adc8}.btn-ghost:hover{background:rgba(255,255,255,.08);color:#fff}
input,select{padding:.5rem .75rem;border-radius:.4rem;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.2);color:#fff;font-size:.78rem;font-family:inherit;outline:none}
input:focus,select:focus{border-color:rgba(71,136,240,.4)}
input{width:100%}
.actions{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.flex-row{display:flex;gap:.75rem;align-items:center}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.section{margin-bottom:2rem}
.panel{padding:1.5rem;border-radius:.75rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);margin-bottom:1rem}
.msg{padding:.6rem 1rem;border-radius:.4rem;font-size:.75rem;margin:.5rem 0;display:none}
.msg.ok{background:rgba(71,136,240,.1);color:#7aafff;display:block}
.msg.err{background:rgba(192,57,74,.1);color:#e8929e;display:block}
.output{max-height:300px;overflow-y:auto;font-family:monospace;font-size:.7rem;background:rgba(0,0,0,.3);padding:.75rem;border-radius:.4rem;margin-top:.5rem;white-space:pre-wrap;word-break:break-all;display:none}
</style>
</head>
<body>

<nav>
  <h1>Nova <span>管理</span></h1>
  <button onclick="showTab('dashboard')" class="active" id="nav-dashboard">📊 仪表盘</button>
  <button onclick="showTab('licenses')" id="nav-licenses">🔑 许可证</button>
  <button onclick="showTab('generate')" id="nav-generate">🎫 生成激活码</button>
</nav>

<main>
  <!-- ═══ Dashboard ═══ -->
  <section id="tab-dashboard">
    <h2>仪表盘</h2>
    <div class="stats" id="dash-stats"></div>
    <div class="panel">
      <h3 style="font-size:.85rem;font-weight:700;margin-bottom:.75rem;color:#fff">主题使用排行 (30天)</h3>
      <div id="dash-themes"></div>
    </div>
  </section>

  <!-- ═══ Licenses ═══ -->
  <section id="tab-licenses" style="display:none">
    <h2>许可证管理</h2>
    <div class="actions">
      <input placeholder="搜索激活码..." id="lic-search" oninput="renderLicenses()" style="max-width:260px">
      <select id="lic-filter" onchange="renderLicenses()">
        <option value="all">全部</option><option value="active">active</option><option value="revoked">revoked</option><option value="expired">expired</option>
      </select>
      <button class="btn btn-ghost" onclick="loadLicenses()">🔄 刷新</button>
    </div>
    <table><thead><tr><th>激活码</th><th>级别</th><th>期限</th><th>设备</th><th>状态</th><th>邮箱</th><th>创建</th><th>到期</th><th>操作</th></tr></thead>
      <tbody id="lic-table"></tbody></table>
    <div id="lic-msg" class="msg"></div>
  </section>

  <!-- ═══ Generate ═══ -->
  <section id="tab-generate" style="display:none">
    <h2>批量生成激活码</h2>
    <div class="panel">
      <div class="flex-row" style="margin-bottom:1rem;flex-wrap:wrap">
        <select id="gen-tier"><option value="member">Member</option></select>
        <select id="gen-dur"><option value="monthly">月付</option><option value="yearly">年付</option><option value="permanent">永久</option></select>
        <input type="number" id="gen-count" value="10" min="1" max="100" style="max-width:80px;text-align:center" placeholder="数量">
        <button class="btn btn-primary" onclick="generateCodes()">🎫 生成</button>
      </div>
      <div id="gen-msg" class="msg"></div>
      <div class="output" id="gen-output"></div>
      <button class="btn btn-ghost" id="gen-copy-btn" style="display:none;margin-top:.5rem" onclick="copyGeneratedCodes()">📋 复制全部</button>
    </div>
    <p style="font-size:.7rem;color:#96adc8;margin-top:.75rem">
      生成后导出为 CSV，按 Member + 月/年/永久 分档上传爱发电卡密库。<br>
      爱发电每档方案独立库，需分别上传。
    </p>
  </section>
</main>

<script>
const API = "";

function getAdminKey() { return localStorage.getItem("nova-admin-key") || ""; }
function h() { return { "X-Admin-Key": getAdminKey(), "Content-Type": "application/json" }; }

// ── Auth ──
function checkAuth() {
  if (getAdminKey()) return true;
  const key = prompt("请输入 Admin Key（服务端管理密钥）：");
  if (!key) return false;
  localStorage.setItem("nova-admin-key", key);
  return true;
}

// ── Tabs ──
window.showTab = function(tab) {
  if (!checkAuth()) return;
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.getElementById("nav-"+tab).classList.add("active");
  document.querySelectorAll("main > section").forEach(s => s.style.display = "none");
  document.getElementById("tab-"+tab).style.display = "block";
  if (tab === "dashboard") loadDashboard();
  if (tab === "licenses") loadLicenses();
};

// ── Dashboard ──
async function loadDashboard() {
  if (!checkAuth()) return;
  const r = await fetch(API+"/api/admin/stats", {headers:{}}).catch(()=>null);
  if (!r || !r.ok) { document.getElementById("dash-stats").innerHTML = '<div class="stat"><div class="l">需要 Admin Key</div></div>'; return; }
  const d = await r.json();
  document.getElementById("dash-stats").innerHTML = [
    {v:d.activeLicenses??0, l:"活跃许可证"},
    {v:d.totalDevices??0, l:"绑定设备"},
    {v:d.totalEvents??0, l:"30天事件"},
  ].map(s=>`<div class="stat"><div class="v">${s.v}</div><div class="l">${s.l}</div></div>`).join("");
  if (d.themeUsage?.length) {
    document.getElementById("dash-themes").innerHTML = d.themeUsage.map(t=>
      `<div style="display:flex;justify-content:space-between;padding:.35rem 0;font-size:.75rem;border-bottom:1px solid rgba(255,255,255,.03)">
        <span style="color:#c8ddf0">${t.theme||"?"}</span><span style="color:#96adc8">${t.switches} 次切换</span></div>`).join("");
  } else document.getElementById("dash-themes").innerHTML = '<span style="font-size:.75rem;color:#96adc8">暂无数据</span>';
}

// ── Licenses ──
let allLicenses = [];
async function loadLicenses() {
  if (!checkAuth()) return;
  const r = await fetch(API+"/api/admin/licenses", {headers:h()}).catch(()=>null);
  if (!r) return;
  allLicenses = await r.json();
  renderLicenses();
}
function renderLicenses() {
  const q = (document.getElementById("lic-search")?.value||"").toLowerCase();
  const f = document.getElementById("lic-filter")?.value||"all";
  const list = allLicenses.filter(l => {
    if (f !== "all" && l.status !== f) return false;
    if (q && !l.code?.toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("lic-table").innerHTML = list.map(l => `<tr>
    <td style="font-family:monospace;color:#fff">${l.code||"?"}</td>
    <td>${l.tier||"?"}</td><td>${l.duration||"?"}</td><td>${l.device_count??0}</td>
    <td><span class="badge ${l.status==='active'?'active':l.status==='revoked'?'revoked':'expired'}">${l.status||"?"}</span></td>
    <td style="font-size:.65rem;color:#96adc8">${l.user_email||"-"}</td>
    <td style="font-size:.65rem;color:#96adc8">${(l.created_at||"").slice(0,10)}</td>
    <td style="font-size:.65rem;color:#96adc8">${l.expires_at?(l.expires_at).slice(0,10):"-"}</td>
    <td>${l.status==='active'?`<button class="btn btn-danger" style="padding:.2rem .5rem;font-size:.65rem" onclick="revoke('${l.id}')">吊销</button>`:""}</td>
  </tr>`).join("");
}

async function revoke(id) {
  if (!confirm("确定吊销此许可证？")) return;
  const r = await fetch(API+"/api/admin/licenses/"+id+"/revoke", {method:"POST",headers:h()});
  const d = await r.json().catch(()=>({}));
  const el = document.getElementById("lic-msg");
  if (r.ok) { el.className = "msg ok"; el.textContent = "已吊销"; loadLicenses(); }
  else { el.className = "msg err"; el.textContent = d.error||"失败"; }
}

// ── Generate ──
let generatedCodes = [];
async function generateCodes() {
  if (!checkAuth()) return;
  const tier = document.getElementById("gen-tier").value;
  const duration = document.getElementById("gen-dur").value;
  const count = Math.min(parseInt(document.getElementById("gen-count").value)||10, 100);
  const r = await fetch(API+"/api/admin/licenses/batch", {method:"POST",headers:h(),body:JSON.stringify({tier,duration,count})});
  const d = await r.json().catch(()=>({}));
  const el = document.getElementById("gen-msg");
  if (!r.ok) { el.className = "msg err"; el.textContent = d.error||"失败"; return; }
  generatedCodes = d.codes||[];
  el.className = "msg ok"; el.textContent = `已生成 ${generatedCodes.length} 个 ${tier}·${duration} 激活码`;
  document.getElementById("gen-output").style.display = "block";
  document.getElementById("gen-output").textContent = generatedCodes.join("\n");
  document.getElementById("gen-copy-btn").style.display = "block";
}
function copyGeneratedCodes() {
  navigator.clipboard.writeText(generatedCodes.join("\n")).then(() => alert("已复制"));
}

// ── Init ──
(function init() {
  if (!getAdminKey() && !checkAuth()) return;
  fetch(API+"/api/admin/stats", {headers:h()}).then(r => {
    if (r.ok) { loadDashboard(); }
    else { localStorage.removeItem("nova-admin-key"); location.reload(); }
  }).catch(()=>{});
})();

// HMR guard
const h1 = document.querySelector('nav h1');
if (h1) h1.insertAdjacentHTML('beforeend', '');
</script>
</body>
</html>
