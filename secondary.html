<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>副屏面板</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:linear-gradient(135deg,#080c14 0%,#0a1628 50%,#080c14 100%);color:#fff;
       font-family:system-ui,sans-serif;overflow:hidden;min-height:100vh;
       display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem}
  h1{font-size:2.5rem;font-weight:800;letter-spacing:-0.02em}
  p{font-size:1rem;color:#96adc8}
  .time{font-size:3rem;font-family:'JetBrains Mono',monospace;color:#7aafff;font-weight:700}
  .date{font-size:0.85rem;color:#56555f}
  .status{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1.5rem;
          border-radius:99px;border:1px solid rgba(71,136,240,0.2);
          background:rgba(71,136,240,0.08);font-size:0.8rem;color:#7aafff}
</style>
</head>
<body>
  <h1>Nova 副屏</h1>
  <p>播放音乐时将展示封面与频谱</p>
  <div class="time" id="time">--:--:--</div>
  <div class="date" id="date"></div>
  <div class="status" id="status">🟢 副屏运行中</div>
  <script>
    function tick() {
      var d = new Date();
      document.getElementById('time').textContent = d.toLocaleTimeString('zh-CN', {hour12:false});
      document.getElementById('date').textContent = d.toLocaleDateString('zh-CN', {
        weekday:'long', year:'numeric', month:'long', day:'numeric'
      });
    }
    tick();
    setInterval(tick, 1000);
    console.log('[secondary] HTML loaded, clock running');
  </script>
</body>
</html>
